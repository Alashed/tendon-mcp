name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: eu-north-1
  INSTANCE_ID: i-08eb56616ddb569bc
  S3_BUCKET: alashed-media

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Build API
        run: npm run build -w packages/api

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Package & upload to S3
        run: |
          cd packages/api
          tar -czf /tmp/api.tar.gz dist migrations package.json ecosystem.config.cjs
          aws s3 cp /tmp/api.tar.gz s3://${{ env.S3_BUCKET }}/deployments/api.tar.gz

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ env.REGION }} \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'cd /home/ubuntu/alashed-tracker',
              'aws s3 cp s3://${{ env.S3_BUCKET }}/deployments/api.tar.gz api.tar.gz --region ${{ env.REGION }}',
              'rm -rf dist migrations ecosystem.config.cjs',
              'tar -xzf api.tar.gz',
              'rm api.tar.gz',
              'npm install --omit=dev --prefer-offline 2>/dev/null || npm install --omit=dev',
              'node dist/scripts/migrate.js',
              'pm2 delete tendon-api 2>/dev/null || true',
              'pm2 delete alashed-tendon-api 2>/dev/null || true',
              'CORS_ORIGINS=https://tendon.alashed.kz,https://www.tendon.alashed.kz TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }} API_BASE_URL=https://api.tendon.alashed.kz pm2 start /home/ubuntu/alashed-tracker/ecosystem.config.cjs',
              'pm2 save',
              'echo DONE'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --region ${{ env.REGION }} \
              --instance-id ${{ env.INSTANCE_ID }} \
              --command-id $COMMAND_ID \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --region ${{ env.REGION }} \
                --instance-id ${{ env.INSTANCE_ID }} \
                --command-id $COMMAND_ID \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1

  deploy-nginx:
    name: Deploy Nginx configs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Upload nginx configs to S3
        run: |
          aws s3 cp infra/nginx-api.conf s3://${{ env.S3_BUCKET }}/nginx/nginx-api.conf
          aws s3 cp infra/nginx-mcp.conf s3://${{ env.S3_BUCKET }}/nginx/nginx-mcp.conf
          aws s3 cp infra/nginx-tendon.conf s3://${{ env.S3_BUCKET }}/nginx/nginx-tendon.conf

      - name: Apply nginx configs via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ env.REGION }} \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'aws s3 cp s3://${{ env.S3_BUCKET }}/nginx/nginx-api.conf /etc/nginx/conf.d/api.tendon.alashed.kz.conf --region ${{ env.REGION }}',
              'aws s3 cp s3://${{ env.S3_BUCKET }}/nginx/nginx-mcp.conf /etc/nginx/conf.d/mcp.tendon.alashed.kz.conf --region ${{ env.REGION }}',
              'aws s3 cp s3://${{ env.S3_BUCKET }}/nginx/nginx-tendon.conf /etc/nginx/conf.d/tendon.alashed.kz.conf --region ${{ env.REGION }}',
              'nginx -t && systemctl reload nginx',
              'echo DONE'
            ]" \
            --output text \
            --query "Command.CommandId")

          for i in $(seq 1 10); do
            STATUS=$(aws ssm get-command-invocation \
              --region ${{ env.REGION }} \
              --instance-id ${{ env.INSTANCE_ID }} \
              --command-id $COMMAND_ID \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --region ${{ env.REGION }} \
                --instance-id ${{ env.INSTANCE_ID }} \
                --command-id $COMMAND_ID \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 6
          done

  deploy-mcp:
    name: Deploy MCP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Build MCP
        run: npm run build -w packages/mcp

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Package & upload to S3
        run: |
          cd packages/mcp
          tar -czf /tmp/mcp.tar.gz dist package.json ecosystem.config.cjs
          aws s3 cp /tmp/mcp.tar.gz s3://${{ env.S3_BUCKET }}/deployments/mcp.tar.gz

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ env.REGION }} \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'mkdir -p /home/ubuntu/apps/tendon-mcp',
              'cd /home/ubuntu/apps/tendon-mcp',
              'aws s3 cp s3://${{ env.S3_BUCKET }}/deployments/mcp.tar.gz mcp.tar.gz --region ${{ env.REGION }}',
              'rm -rf dist package.json ecosystem.config.cjs',
              'tar -xzf mcp.tar.gz',
              'rm mcp.tar.gz',
              'npm install --omit=dev --prefer-offline 2>/dev/null || npm install --omit=dev',
              'pm2 delete tendon-mcp 2>/dev/null || true',
              'pm2 delete alashed-mcp 2>/dev/null || true',
              'ALASHED_API_URL=https://api.tendon.alashed.kz MCP_BASE_URL=https://mcp.tendon.alashed.kz pm2 start /home/ubuntu/apps/tendon-mcp/ecosystem.config.cjs',
              'pm2 save',
              'echo DONE'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --region ${{ env.REGION }} \
              --instance-id ${{ env.INSTANCE_ID }} \
              --command-id $COMMAND_ID \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --region ${{ env.REGION }} \
                --instance-id ${{ env.INSTANCE_ID }} \
                --command-id $COMMAND_ID \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        env:
          NEXT_PUBLIC_API_URL: https://api.tendon.alashed.kz
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /register
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
        run: npm run build -w packages/web

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Package & upload to S3
        run: |
          cd packages/web
          mkdir -p .next/standalone/packages/web/.next
          cp -r .next/static .next/standalone/packages/web/.next/static
          cp -r public .next/standalone/packages/web/public 2>/dev/null || true
          tar -czf /tmp/web.tar.gz -C .next/standalone .
          aws s3 cp /tmp/web.tar.gz s3://${{ env.S3_BUCKET }}/deployments/web.tar.gz

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ env.REGION }} \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -e',
              'mkdir -p /home/ubuntu/apps/alashed-web',
              'cd /home/ubuntu/apps/alashed-web',
              'aws s3 cp s3://${{ env.S3_BUCKET }}/deployments/web.tar.gz web.tar.gz --region ${{ env.REGION }}',
              'rm -rf node_modules packages .next public package.json',
              'tar -xzf web.tar.gz',
              'rm web.tar.gz',
              'pm2 delete tendon-web 2>/dev/null || true',
              'pm2 delete alashed-web 2>/dev/null || true',
              'PORT=3030 CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }} pm2 start /home/ubuntu/apps/alashed-web/packages/web/server.js --name tendon-web --cwd /home/ubuntu/apps/alashed-web/packages/web',
              'pm2 save',
              'echo DONE'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region ${{ env.REGION }} \
              --instance-id ${{ env.INSTANCE_ID }} \
              --command-id $COMMAND_ID \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --region ${{ env.REGION }} \
                --instance-id ${{ env.INSTANCE_ID }} \
                --command-id $COMMAND_ID \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1
