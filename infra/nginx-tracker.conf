server {
    listen 80;
    server_name tracker.alashed.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tracker.alashed.kz;

    ssl_certificate     /etc/letsencrypt/live/tracker.alashed.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tracker.alashed.kz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Next.js static assets served directly
    location /_next/static/ {
        alias /home/ubuntu/apps/alashed-tracker/packages/web/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public files
    location /public/ {
        alias /home/ubuntu/apps/alashed-tracker/packages/web/.next/standalone/public/;
        expires 7d;
        access_log off;
    }

    # Next.js app
    location / {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
