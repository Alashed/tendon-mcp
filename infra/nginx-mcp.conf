server {
    listen 80;
    server_name mcp.tendon.alashed.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.tendon.alashed.kz;

    ssl_certificate     /etc/letsencrypt/live/mcp.tendon.alashed.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.tendon.alashed.kz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # SSE / streaming support for MCP
        proxy_buffering    off;
        proxy_cache        off;
    }
}
